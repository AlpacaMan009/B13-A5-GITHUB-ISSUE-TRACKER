<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>

    <!-- DaisyUI and Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font: Geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">




    <style>
        * {
            font-family: "Geist", sans-serif;
            ;
        }
    </style>
</head>

<body class="bg-slate-100">

    <!-- login section -->
    <section id="logIn-section" class="h-screen flex justify-center items-center">
        <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4 flex flex-col
        items-center justify-center space-y-5">
            <img src="./assets/github-logo.png" alt="">

            <div class="text-center">
                <h2 class="text-2xl font-semibold ">GitHub Issues Tracker</h2>
                <p>Sign in to manage your issues</p>
            </div>
            <div class="">
                <label class="label">Username</label>
                <input id="username" type="text" class="input" placeholder="Enter Username" />
                <p class="text-[#4A00FF]">Default:admin</p>

                <label class="label mt-3">Password</label>
                <input id="password" type="text" class="input" placeholder="Enter Password" />
                <p class="text-[#4A00FF]">Default:admin123</p>
            </div>

            <button id="signIn-btn" type="button" class="btn btn-primary mt-4">Sign In</button>
        </fieldset>
    </section>

    <script src="signin.js"></script>
        
</body>
